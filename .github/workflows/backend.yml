name: Backend

on:
  push:
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend.yml"]

jobs:
  test-sqlite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q

  # Same suite against PostgreSQL with the schema built by Alembic —
  # exactly how the production stack (docker-compose.prod.yml) runs.
  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taxi
          POSTGRES_PASSWORD: taxi
          POSTGRES_DB: taxi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taxi -d taxi"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://taxi:taxi@localhost:5432/taxi
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: python -m pytest tests/ -q
