name: Android APK

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "android/**"
      - "backend/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug and release APKs (rider + driver)
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug assembleRelease

      - name: Upload rider debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IraqTaxi-rider-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload rider release APK
        uses: actions/upload-artifact@v4
        with:
          name: IraqTaxi-rider-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload driver debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IraqTaxi-driver-debug-apk
          path: android/driver/build/outputs/apk/debug/driver-debug.apk

      - name: Upload driver release APK
        uses: actions/upload-artifact@v4
        with:
          name: IraqTaxi-driver-release-apk
          path: android/driver/build/outputs/apk/release/driver-release.apk

      - name: Prepare direct-download APKs
        run: |
          mkdir -p release-apks
          cp android/app/build/outputs/apk/release/app-release.apk release-apks/TaxiOneIraq-Rider.apk
          cp android/driver/build/outputs/apk/release/driver-release.apk release-apks/TaxiOneIraq-Driver.apk
          cp android/driver/build/outputs/apk/debug/driver-debug.apk release-apks/TaxiOneIraq-Driver-debug.apk

      - name: Publish APKs with direct download links
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "تكسي واحد عراق — أحدث نسخ APK"
          body: |
            حمّل الملف وثبّته مباشرة على أندرويد (فعّل «التثبيت من مصادر غير معروفة»):

            - **TaxiOneIraq-Rider.apk** — تطبيق الزبون
            - **TaxiOneIraq-Driver.apk** — تطبيق السائق
            - **TaxiOneIraq-Driver-debug.apk** — نسخة السائق للتجربة مع خادم محلي (تسمح بـ HTTP)

            تُحدَّث هذه الملفات تلقائياً مع كل نسخة جديدة من الكود.
          make_latest: true
          files: release-apks/*.apk

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test
        working-directory: backend
        run: |
          pip install -r requirements.txt
          python -m pytest tests/ -q
