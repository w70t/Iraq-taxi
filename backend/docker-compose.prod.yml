# Production stack. Runs identically on a Raspberry Pi 5 (arm64) and on any
# cloud VM (amd64) — every image here is an official multi-arch build, and
# all state lives in the named volumes below. Migrating hosts = copy .env,
# restore a pg_dump, `docker compose -f docker-compose.prod.yml up -d`.
#
# Usage:   docker compose -f docker-compose.prod.yml up -d --build
services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://taxi:${POSTGRES_PASSWORD}@db:5432/taxi
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000
                     --workers ${API_WORKERS:-2}
                     --proxy-headers --forwarded-allow-ips '*'"
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taxi
      POSTGRES_DB: taxi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  # Caddy terminates HTTPS with automatic Let's Encrypt certificates for
  # $DOMAIN and proxies everything (including WebSockets) to the API.
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
